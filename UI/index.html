<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Upload</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #formSection { display: none; margin-top: 20px; }
        label { display: block; margin: 10px 0 5px; }
        input[type=text], input[type=number] { width: 300px; padding: 5px; }
        button { padding: 10px 20px; margin-top: 15px; }
        #message { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Welcome to DNA Upload</h1>
    <button id="uploadBtn">UPLOAD</button>

    <div id="formSection">
        <form id="dnaForm">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required min="0">

            <label for="seq">DNA Sequence:</label>
            <input type="text" id="seq" name="seq" required pattern="[ACGTacgt]+" title="Only A,C,G,T characters allowed">

            <button type="submit">SUBMIT</button>
        </form>
    </div>

    <div id="message"></div>

    <script>
        const uploadBtn = document.getElementById('uploadBtn');
        const formSection = document.getElementById('formSection');
        const dnaForm = document.getElementById('dnaForm');
        const messageDiv = document.getElementById('message');

        uploadBtn.addEventListener('click', () => {
            formSection.style.display = 'block';
            uploadBtn.style.display = 'none';
        });

        dnaForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageDiv.textContent = '';

            const name = document.getElementById('name').value.trim();
            const age = parseInt(document.getElementById('age').value);
            const seq = document.getElementById('seq').value.trim().toUpperCase();

            // Validate DNA sequence strictly
            if (!/^[ACGT]+$/.test(seq)) {
                messageDiv.textContent = 'Invalid DNA sequence! Only A, C, G, T allowed.';
                messageDiv.style.color = 'red';
                return;
            }

            const payload = { name, age, seq };

            try {
                const response = await fetch('http://127.0.0.1:8000/Data/1', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                const result = await response.json();

                if (response.ok) {
                    messageDiv.textContent = 'Success: ' + result.message;
                    messageDiv.style.color = 'green';
                    dnaForm.reset();
                } else {
                    messageDiv.textContent = 'Error: ' + (result.detail || 'Unknown error');
                    messageDiv.style.color = 'red';
                }
            } catch (error) {
                messageDiv.textContent = 'Network error: ' + error.message;
                messageDiv.style.color = 'red';
            }
        });
    </script>
</body>
</html>
